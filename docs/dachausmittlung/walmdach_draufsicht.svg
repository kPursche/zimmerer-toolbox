<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 640" font-family="Arial, sans-serif">
  <rect width="820" height="640" fill="#fafafa"/>
  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold">Walmdach – Draufsicht (maßstabsgetreu, 50 px = 1,00 m)</text>
  <text x="410" y="52" text-anchor="middle" font-size="13" fill="#333">Grundriss 12,00 × 8,00 m | Hauptdach 45° | Walm 55°</text>
  <g transform="translate(110, 110)">
    <g stroke="#dddddd" stroke-width="0.5">
